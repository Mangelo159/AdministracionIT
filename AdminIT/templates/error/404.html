<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404: This page could not be found</title>
  <style>
    body {
      margin: 0;
      color: #000;
      background: #fff;
      font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .error h1 {
      display: inline-block;
      margin: 0 20px 0 0;
      padding: 0 23px 0 0;
      font-size: 24px;
      font-weight: 500;
      vertical-align: top;
      line-height: 49px;
      border-right: 1px solid rgba(0, 0, 0, .3);
    }
    .error h2 {
      display: inline-block;
      margin: 0;
      font-size: 14px;
      font-weight: 400;
      line-height: 49px;
    }
  </style>
</head>
<body>
  <div class="error">
    <h1>404</h1>
    <h2>This page could not be found.</h2>
  </div>
</body>
</html>
