{# Alerta de error — uso: {% include 'components/alert_error.html' with mensaje="Texto del error" %} #}
{% if mensaje %}
<div class="flex gap-3 items-start px-4 py-3 mb-4
            rounded-[10px] bg-error/[8%] border border-error/35
            text-[#B3261E] text-[13.5px] leading-[1.45]"
     role="alert">
    <svg class="shrink-0 mt-px" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v4"/>
        <path d="M12 16h.01"/>
    </svg>
    <div>{{ mensaje }}</div>
</div>
{% endif %}
